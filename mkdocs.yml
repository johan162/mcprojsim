site_name: Monte Carlo Project Simulator
site_description: A probabilistic project estimation tool using Monte Carlo simulation
site_author: Johan Persson
site_url: https://johan162.github.io/mcprojsim

repo_name: johan162/mcprojsim
repo_url: https://github.com/johan162/mcprojsim
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - User Guide:
      - Getting Started: user_guide/getting_started.md
      - Introduction: user_guide/introduction.md
      - Your first project: user_guide/your_first_project.md
      - Uncertainty Factors: user_guide/uncertainty_factors.md
      - Task Estimation: user_guide/task_estimation.md
      - Project Risks: user_guide/risks.md
      - Project Files: user_guide/project_files.md
      - Sprint Planning: user_guide/sprint_planning.md
      - Resource and Calendar Constrained Scheduling: user_guide/constrained.md
      - Multi-Phase (Two-Pass) Simulation: user_guide/multi_phase_simulation.md
      - Running Simulations: user_guide/running_simulations.md
      - Interpreting Results: user_guide/interpreting_results.md
      - Configuration: user_guide/configuration.md
      - MCP Server: user_guide/mcp-server.md
      - Examples: examples.md
  - Dev Guide: development.md
  - API Reference: api_reference.md
  - EBNF Grammar: grammar.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            show_root_heading: true
            show_source: true
            show_bases: true
            show_inheritance_diagram: true
            members_order: source
            group_by_category: true
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            signature_crossrefs: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/johan162/mcprojsim
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/mcprojsim/
