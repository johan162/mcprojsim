site_name: Monte Carlo Project Simulator
site_description: A project estimation tool using Monte Carlo simulation
site_author: Johan Persson
site_url: https://johan162.github.io/mcprojsim

repo_name: johan162/mcprojsim
repo_url: https://github.com/johan162/mcprojsim

# README.md is developer-facing only (documents the docs/ structure).
# Exclude it so it does not conflict with index.md in the rendered site.
exclude_docs: |
  README.md

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - User Guide:
      - Getting Started:         user_guide/01_getting_started.md
      - Introduction:            user_guide/02_introduction.md
      - Your first project:      user_guide/03_your_first_project.md
      - Uncertainty Factors:     user_guide/04_uncertainty_factors.md
      - Task Estimation:         user_guide/05_task_estimation.md
      - Project Risks:           user_guide/06_risks.md
      - Cost Estimation:         user_guide/07_cost_handling.md
      - Project Files:           user_guide/08_project_files.md
      - Sprint Planning:         user_guide/09_sprint_planning.md
      - Constrained Scheduling:  user_guide/10_constrained.md
      - Two-Pass Simulation:     user_guide/11_multi_phase_simulation.md
      - Running Simulations:     user_guide/12_running_simulations.md
      - Interpreting Results:    user_guide/13_interpreting_results.md
      - Configuration:           user_guide/14_configuration.md
      - Natural Language Input:  user_guide/15_nl_processing.md      
      - MCP Server:              user_guide/16_mcp-server.md
      - Examples:                          17_examples.md
  - API Reference:
      - API Reference:           api_reference/01_intro.md
      - Core API:                api_reference/02_core.md
      - Project model:           api_reference/03_project_model.md
      - Simulation:              api_reference/04_simulation_results.md
      - Parsers:                 api_reference/05_parsers.md
      - Configuration:           api_reference/06_configuration.md
      - Exporters:               api_reference/07_exporters.md
      - Analysis helpers:        api_reference/08_analysis_helpers.md
      - Validation utilities:    api_reference/09_validation_utilities.md
      - Natural language parser: api_reference/10_nl_parser.md
      - API Examples:            api_reference/11_api_examples.md
  - Dev Guide:    development.md
  - EBNF Grammar: grammar.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            show_root_heading: true
            show_source: true
            show_bases: true
            show_inheritance_diagram: true
            members_order: source
            group_by_category: true
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            signature_crossrefs: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/johan162/mcprojsim
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/mcprojsim/
