uncertainty_factors:
  team_experience:
    high: 0.90      # Experienced team is 10% faster
    medium: 1.0     # Baseline
    low: 1.30       # Inexperienced team is 30% slower
  
  requirements_maturity:
    high: 1.0       # Well-defined requirements
    medium: 1.15    # Some ambiguity
    low: 1.40       # High ambiguity
  
  technical_complexity:
    low: 1.0        # Simple, well-understood technology
    medium: 1.20    # Moderate complexity
    high: 1.50      # High complexity, cutting-edge tech
  
  team_distribution:
    colocated: 1.0  # Team in same location
    distributed: 1.25  # Distributed team with communication overhead
  
  integration_complexity:
    low: 1.0        # Minimal integration
    medium: 1.15    # Moderate integration
    high: 1.35      # Complex integration with multiple systems

# T-shirt size effort estimates by category (in days)
# Bare values like "M" resolve through t_shirt_size_default_category.
# Qualified values like "epic.M" resolve through the named category.
t_shirt_sizes:
  story:
    XS:
      low: 0.5
      expected: 1
      high: 2
    S:
      low: 1
      expected: 2
      high: 4
    M:
      low: 3
      expected: 5
      high: 8
    L:
      low: 5
      expected: 8
      high: 13
    XL:
      low: 8
      expected: 13
      high: 21
    XXL:
      low: 13
      expected: 21
      high: 34
  epic:
    XS:
      low: 20
      expected: 30
      high: 50
    S:
      low: 30
      expected: 50
      high: 80
    M:
      low: 50
      expected: 80
      high: 130
    L:
      low: 80
      expected: 130
      high: 210
    XL:
      low: 130
      expected: 210
      high: 340
    XXL:
      low: 210
      expected: 340
      high: 550

t_shirt_size_default_category: story

simulation:
  default_iterations: 10000
  random_seed: null  # null for random, or integer for reproducibility
  max_stored_critical_paths: 20  # keep the 20 most frequent full paths in results

output:
  formats: ["json", "csv", "html"]
  include_histogram: true
  histogram_bins: 50
  critical_path_report_limit: 2  # show the two most common full paths by default

# Staffing analysis settings
# effort_percentile: use a specific percentile of the effort distribution
#   instead of the mean.  Set to 80 or 90 for conservative planning.
#   Omit or set to null to use the mean (default).
staffing:
  effort_percentile: null
  min_individual_productivity: 0.25
  experience_profiles:
    senior:
      productivity_factor: 1.0
      communication_overhead: 0.04
    mixed:
      productivity_factor: 0.85
      communication_overhead: 0.06
    junior:
      productivity_factor: 0.65
      communication_overhead: 0.08

# Default sickness probability for resources that omit resources[*].sickness_prob
constrained_scheduling:
  sickness_prob: 0.0

# Shared defaults for sprint-planning models and the constrained scheduler's
# sickness-duration distribution. Per-resource sickness probability still
# belongs in the project file via resources[*].sickness_prob.
sprint_defaults:
  planning_confidence_level: 0.8
  removed_work_treatment: churn_only
  velocity_model: empirical
  sickness:
    enabled: false
    probability_per_person_per_week: 0.058
    duration_log_mu: 0.693
    duration_log_sigma: 0.75
