name: Release

on:
  workflow_run:
    workflows:
      - Continuous Integration
    types:
      - completed
  workflow_dispatch:
    inputs:
      sha:
        description: Optional commit SHA on main to release
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref_name || inputs.sha || 'manual' }}
  cancel-in-progress: false

jobs:
  release:
    name: Create tag, GitHub Release, and publish package
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Resolve target SHA
        id: target
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.sha }}" ]]; then
            echo "sha=${{ inputs.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.target.outputs.sha }}

      - name: Validate release intent
        id: intent
        run: |
          COMMIT_SUBJECT=$(git log -1 --pretty=%s)
          echo "commit_subject=${COMMIT_SUBJECT}" >> "$GITHUB_OUTPUT"
          if [[ "$COMMIT_SUBJECT" == release:\ * ]] || [[ "$COMMIT_SUBJECT" == chore\(release\):\ prepare\ v* ]]; then
            echo "release_intent=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_intent=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if commit is not a release-preparation commit
        if: steps.intent.outputs.release_intent != 'true'
        run: |
          echo "Skipping: commit is not a release-preparation commit"
          exit 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(awk -F '"' '/^version = / {print $2; exit}' pyproject.toml)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate changelog entry exists
        run: |
          grep -Eq "^## \[${{ steps.version.outputs.tag }}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md

      - name: Check whether tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if tag already exists
        if: steps.tag_check.outputs.exists == 'true'
        run: |
          echo "Tag ${{ steps.version.outputs.tag }} already exists. Nothing to do."
          exit 0

      - name: Download release-dist from triggering CI run
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          mkdir -p release-artifacts
          gh run download "$RUN_ID" --name release-dist --dir release-artifacts

      - name: Build artifacts when manually dispatched
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Manual dispatch path should either rebuild release artifacts here or download them from a selected CI run."
          echo "This proposal keeps the manual path explicit instead of silently rebuilding the wrong commit."
          exit 1

      - name: Normalize artifact layout
        if: github.event_name == 'workflow_run'
        run: |
          mkdir -p dist
          find release-artifacts -type f -name '*.whl' -exec cp {} dist/ \;
          find release-artifacts -type f -name '*.tar.gz' -exec cp {} dist/ \;
          find release-artifacts -type f -name '*.zip' -exec cp {} dist/ \;
          find release-artifacts -type f -name 'mcprojsim_user_guide-v*.pdf' -exec cp {} . \;

      - name: Validate downloaded artifacts
        run: |
          test -f "dist/mcprojsim-${{ steps.version.outputs.version }}-py3-none-any.whl"
          test -f "dist/mcprojsim-${{ steps.version.outputs.version }}.tar.gz"
          test -f "dist/mcprojsim-mcp-bundle-${{ steps.version.outputs.version }}.zip"
          test -f "mcprojsim_user_guide-v${{ steps.version.outputs.version }}.pdf"

      - name: Extract changelog notes
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[v${VERSION}\]/{found=1; next} /^## \[v[0-9]/{if(found) exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create annotated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            dist/* \
            mcprojsim_user_guide-v${{ steps.version.outputs.version }}.pdf \
            --title "MCProjSim ${{ steps.version.outputs.tag }}" \
            --notes "${{ steps.changelog.outputs.notes }}"

      - name: Publish to TestPyPI for pre-release tags
        if: contains(steps.version.outputs.version, 'rc')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

      - name: Publish to PyPI for stable tags
        if: ${{ !contains(steps.version.outputs.version, 'rc') }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/