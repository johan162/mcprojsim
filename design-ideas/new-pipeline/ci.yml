name: Continuous Integration

on:
  push:
    branches:
      - develop
      - main
      - feature/**
      - bugfix/**
      - hotfix/**
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.13'
  POETRY_NO_INTERACTION: '1'
  POETRY_VIRTUALENVS_IN_PROJECT: 'true'

jobs:
  code-check:
    name: Code check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python and Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          dependency-groups: dev,mcp
          install-root: 'false'

      - name: Formatting check
        run: poetry run black --check src tests

      - name: Lint check
        run: poetry run flake8 src tests

      - name: Type check
        run: poetry run mypy src tests

  testing:
    name: Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Set up Python and Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          dependency-groups: dev,mcp
          install-root: 'true'

      - name: Run unit tests with coverage
        run: |
          poetry run pytest \
            tests/ \
            -m "not heavy" \
            -n auto \
            --cov=src/mcprojsim \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-report=xml \
            --junitxml=pytest-report.xml \
            --cov-fail-under=80

      - name: Run smoke tests
        run: |
          poetry run mcprojsim --help
          poetry run mcprojsim validate examples/sample_project.yaml
          poetry run mcprojsim simulate examples/sample_project.yaml --iterations 50 --quiet
          poetry run mcprojsim simulate examples/tshirt_sizing_project.yaml --iterations 50 --quiet
          poetry run mcprojsim simulate examples/project_with_custom_thresholds.yaml --iterations 50 --quiet

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ env.PYTHON_VERSION }}
          path: |
            htmlcov/
            .coverage
            pytest-report.xml
          retention-days: 7

  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs:
      - code-check
      - testing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies for PDF/docs assets
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex graphviz fonts-dejavu-core

      - name: Set up Python and Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          dependency-groups: dev,docs,mcp
          install-root: 'false'

      - name: Create Python artifacts
        run: poetry build

      - name: Create MCP bundle
        run: ./scripts/mkmcpbundle.sh

      - name: Create User Guide PDF
        run: make pdf

      - name: Verify Python artifacts with Twine
        run: poetry run twine check dist/*

      - name: Validate expected release artifacts
        run: |
          VERSION=$(awk -F '"' '/^version = / {print $2; exit}' pyproject.toml)
          test -f "dist/mcprojsim-${VERSION}-py3-none-any.whl"
          test -f "dist/mcprojsim-${VERSION}.tar.gz"
          test -f "dist/mcprojsim-mcp-bundle-${VERSION}.zip"
          test -f "mcprojsim_user_guide-v${VERSION}.pdf"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: |
            dist/
            mcprojsim_user_guide-v*.pdf
          retention-days: 7