# Experiment: Resource-constrained scheduling
project:
  name: "Constrained Scheduling Experiment"
  start_date: "2026-04-01"
  hours_per_day: 8
  confidence_levels: [50, 80, 90]

tasks:
  - id: "task_001"
    name: "Requirements"
    estimate: { low: 8, expected: 16, high: 24 }

  - id: "task_002"
    name: "Backend"
    estimate: { low: 40, expected: 64, high: 96 }
    dependencies: ["task_001"]
    resources: ["alice", "bob"]
    max_resources: 2

  - id: "task_003"
    name: "Frontend"
    estimate: { low: 30, expected: 48, high: 72 }
    dependencies: ["task_001"]
    resources: ["charlie"]
    min_experience_level: 2

  - id: "task_004"
    name: "Integration"
    estimate: { low: 16, expected: 24, high: 40 }
    dependencies: ["task_002", "task_003"]
    resources: ["alice", "charlie"]
    max_resources: 2

resources:
  - name: "alice"
    calendar: "default"
    experience_level: 3
    productivity_level: 1.0
    sickness_prob: 0.01
  - name: "bob"
    calendar: "default"
    experience_level: 2
    productivity_level: 0.9
    sickness_prob: 0.01
  - name: "charlie"
    calendar: "short_week"
    experience_level: 2
    productivity_level: 1.1
    planned_absence: ["2026-04-22", "2026-04-23"]

calendars:
  - id: "default"
    work_hours_per_day: 8
    work_days: [1, 2, 3, 4, 5]
    holidays: ["2026-04-10"]
  - id: "short_week"
    work_hours_per_day: 6
    work_days: [1, 2, 3, 4]
    holidays: []
