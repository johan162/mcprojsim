project:
  name: "Payment Gateway Integration"
  description: "Risks example from ch06"
  start_date: "2026-05-01"
  confidence_levels: [50, 80, 90, 95]

project_risks:
  - id: "proj_risk_001"
    name: "Vendor API contract delay"
    probability: 0.20
    impact:
      type: "absolute"
      value: 15
      unit: "days"
    description: "Payment provider delays final API specification delivery"
  - id: "proj_risk_002"
    name: "Compliance review extends timeline"
    probability: 0.25
    impact:
      type: "percentage"
      value: 15
    description: "PCI-DSS compliance review reveals additional work"

tasks:
  - id: "pay_001"
    name: "API client library"
    estimate:
      low: 5
      expected: 8
      high: 14
      unit: "days"
    risks:
      - id: "pay_risk_001"
        name: "Incomplete vendor documentation"
        probability: 0.35
        impact: 4

  - id: "pay_002"
    name: "Transaction processing engine"
    estimate:
      low: 8
      expected: 12
      high: 20
      unit: "days"
    dependencies: ["pay_001"]
    risks:
      - id: "pay_risk_002"
        name: "Edge cases in currency conversion"
        probability: 0.20
        impact: 3
      - id: "pay_risk_003"
        name: "Retry logic complexity"
        probability: 0.15
        impact: 2

  - id: "pay_003"
    name: "Integration testing with sandbox"
    estimate:
      low: 3
      expected: 5
      high: 10
      unit: "days"
    dependencies: ["pay_002"]
    risks:
      - id: "pay_risk_004"
        name: "Sandbox environment instability"
        probability: 0.40
        impact: 3

  - id: "pay_004"
    name: "Security hardening"
    estimate:
      low: 4
      expected: 6
      high: 10
      unit: "days"
    dependencies: ["pay_002"]
    risks:
      - id: "pay_risk_005"
        name: "Penetration test findings"
        probability: 0.25
        impact:
          type: "percentage"
          value: 30
